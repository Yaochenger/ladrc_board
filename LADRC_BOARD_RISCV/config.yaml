board: LADRC_BOARD
chip_vendor: WCH
chip_series: CH32
chip_subseries: CH32V307
chip: CH32V307VCT6
prefix: SDK_USING_
on_chip_peripherals:
- device:
    name: UART
    description: Universal Asynchronous Receiver-Transmitter
    instances:
    - name: USART2
      enabled: true
      pins:
      - name: TX
        pin: PA9
      - name: RX
        pin: PA10
    - name: USART2
      enabled: true
      pins:
      - name: TX
        pin: PA11
      - name: RX
        pin: PA12
    - name: USART3
      enabled: true
      pins:
      - name: TX
        pin: PA13
      - name: RX
        pin: PA14
- device:
    name: SPI
    description: Serial Peripheral Interface
    instances:
    - name: SPI1
      enabled: true
      pins:
      - name: SCK
        pin: PB12
      - name: MISO
        pin: PB13
      - name: MOSI
        pin: PB14
      - name: CS
        pin: PB15
    - name: SPI2
      enabled: true
      pins:
      - name: SCK
        pin: PB12
      - name: MISO
        pin: PC13
      - name: MOSI
        pin: PC14
      - name: CS
        pin: PC15
    - name: SPI3
      enabled: true
      pins:
      - name: SCK
        pin: PD12
      - name: MISO
        pin: PD13
      - name: MOSI
        pin: PD14
      - name: CS
        pin: PC15
- device:
    name: I2C
    description: Inter-Integrated Circuit
    instances:
    - name: I2C1
      enabled: true
      pins:
      - name: SCL
        pin: PB6
      - name: SDA
        pin: PB7
    - name: I2C2
      enabled: true
      pins:
      - name: SCL
        pin: PB8
      - name: SDA
        pin: PB9
    - name: I2C3
      enabled: true
      pins:
      - name: SCL
        pin: PA8
      - name: SDA
        pin: PC9
- device:
    name: ADC
    description: Analog-to-Digital Converter
    instances:
    - name: ADC1
      enabled: true
      pins:
      - name: IN0
        pin: PA0
    - name: ADC2
      enabled: true
      pins:
      - name: IN0
        pin: PA1
- device:
    name: GPIO
    description: I/O
    instances:
    - name: GPIOA
      enabled: true
    - name: GPIOB
      enabled: true
    - name: GPIOC
      enabled: true
    - name: GPIOD
      enabled: true
    - name: GPIOE
      enabled: true
    - name: GPIOF
      enabled: true
    - name: GPIOG
      enabled: true
- device:
    name: USR
    description: USR
    instances:
    - name: USR1
      enabled: true
    - name: USR2
      enabled: true
    - name: USR3
      enabled: true
components:
- pkg:
    name: SFUD
    description: SPI Flash File System
    enabled: true
- pkg:
    name: SHELL
    description: Command Line Shell
    enabled: true
- pkg:
    name: USR
    description: Command Line Shell
    enabled: true
testcases:
- case:
    name: UART
    description: null
    enabled: true
- case:
    name: LED
    description: null
    enabled: true
- case:
    name: GUI
    description: null
    enabled: true
- case:
    name: SHELL
    description: null
    enabled: true
